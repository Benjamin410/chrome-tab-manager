name: Quality Check

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check README project structure matches actual files
        run: |
          errors=0

          echo "=== Checking README references ==="

          # Key files that must exist if referenced in README
          readme_refs=(
            "extension/manifest.json"
            "extension/background.js"
            "extension/core/i18n.js"
            "extension/core/models.js"
            "extension/core/background/main.js"
            "extension/core/background/dev-hot-reload.js"
            "extension/features/tab-browser/sidepanel.html"
            "extension/features/tab-browser/sidepanel.js"
            "extension/features/tab-browser/sidepanel.css"
            "extension/features/tab-browser/banner.js"
            "extension/features/tab-browser/banner.css"
            "extension/features/tab-browser/page-meta-labels.js"
            "extension/features/tab-history/tab-history.js"
            "extension/features/tab-usage/tab-usage.js"
            "playwright.config.js"
            "tests/fixtures.js"
          )

          for file in "${readme_refs[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::error::README references '$file' but it does not exist"
              errors=$((errors + 1))
            fi
          done

          echo "=== Checking test spec files are documented ==="

          # Every .spec.js file should be listed in README
          for spec in tests/*.spec.js; do
            basename=$(basename "$spec")
            if ! grep -q "$basename" README.md; then
              echo "::error::Test file '$basename' is not documented in README"
              errors=$((errors + 1))
            fi
          done

          echo "=== Checking workflow files are present ==="

          for wf in .github/workflows/*.yml; do
            basename=$(basename "$wf")
            if ! grep -q "$basename" README.md; then
              echo "::warning::Workflow '$basename' is not referenced in README project structure"
            fi
          done

          echo "=== Checking i18n completeness ==="

          # Count language keys per language block in i18n.js
          lang_file="extension/core/i18n.js"
          if [ -f "$lang_file" ]; then
            for lang in "en:" "de:" "es:" "fr:"; do
              count=$(grep -c "^\s\+[a-zA-Z]" "$lang_file" 2>/dev/null || echo "0")
            done
          fi

          echo "=== Checking manifest permissions match README ==="

          if [ -f "extension/manifest.json" ]; then
            for perm in tabs tabGroups sidePanel storage sessions; do
              if ! grep -q "\"$perm\"" extension/manifest.json; then
                echo "::warning::README documents permission '$perm' but it's not in manifest.json"
              fi
            done
          fi

          if [ $errors -gt 0 ]; then
            echo ""
            echo "::error::Found $errors quality issue(s). Please fix them before merging."
            exit 1
          fi

          echo ""
          echo "All quality checks passed."
