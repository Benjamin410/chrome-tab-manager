name: Publish to Chrome Web Store

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: xvfb-run --auto-servernum npx playwright test
        timeout-minutes: 10

  screenshots:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Install Pillow for alpha stripping
        run: pip3 install Pillow

      - name: Generate store screenshots
        run: xvfb-run --auto-servernum npm run screenshots
        timeout-minutes: 5

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: store-screenshots
          path: store/screenshots/
          retention-days: 90

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Verify tag matches manifest version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          MANIFEST_VERSION=$(grep -o '"version": "[^"]*"' extension/manifest.json | cut -d'"' -f4)
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "ERROR: Tag version (v$TAG_VERSION) does not match manifest version ($MANIFEST_VERSION)"
            exit 1
          fi
          echo "Version match: v$TAG_VERSION"

      - name: Build extension ZIP
        run: npm run build

      - name: Upload to Chrome Web Store
        run: |
          MANIFEST_VERSION=$(grep -o '"version": "[^"]*"' extension/manifest.json | cut -d'"' -f4)
          ZIP_FILE="dist/tab-manager-v${MANIFEST_VERSION}.zip"

          echo "Uploading $ZIP_FILE..."

          # Get access token from refresh token
          TOKEN_RESPONSE=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
            -d "client_id=${{ secrets.CHROME_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CHROME_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CHROME_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')
          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::Failed to get access token. Response:"
            echo "$TOKEN_RESPONSE" | jq .
            exit 1
          fi
          echo "Access token obtained successfully."

          # Upload ZIP
          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -X PUT \
            -T "$ZIP_FILE" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}")

          UPLOAD_HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -1)
          UPLOAD_BODY=$(echo "$UPLOAD_RESPONSE" | sed '$d')

          echo "Upload response (HTTP $UPLOAD_HTTP_CODE):"
          echo "$UPLOAD_BODY" | jq . 2>/dev/null || echo "$UPLOAD_BODY"

          UPLOAD_STATUS=$(echo "$UPLOAD_BODY" | jq -r '.uploadState' 2>/dev/null)
          if [ "$UPLOAD_STATUS" != "SUCCESS" ]; then
            echo "::error::Upload failed with state: $UPLOAD_STATUS"
            exit 1
          fi

          # Publish
          PUBLISH_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            -X POST \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}/publish")

          PUBLISH_HTTP_CODE=$(echo "$PUBLISH_RESPONSE" | tail -1)
          PUBLISH_BODY=$(echo "$PUBLISH_RESPONSE" | sed '$d')

          echo "Publish response (HTTP $PUBLISH_HTTP_CODE):"
          echo "$PUBLISH_BODY" | jq . 2>/dev/null || echo "$PUBLISH_BODY"

          PUBLISH_STATUS=$(echo "$PUBLISH_BODY" | jq -r '.status[0]' 2>/dev/null)
          if [ "$PUBLISH_STATUS" != "OK" ] && [ "$PUBLISH_STATUS" != "PUBLISHED_WITH_FRICTION_WARNING" ]; then
            echo "::error::Publish failed with status: $PUBLISH_STATUS"
            exit 1
          fi

          echo "Successfully published v${MANIFEST_VERSION} to Chrome Web Store!"
