name: Generate Screenshots

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    paths:
      - 'extension/**'
      - 'scripts/screenshots.js'

permissions:
  contents: write
  pull-requests: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Install Pillow for alpha stripping
        run: pip3 install Pillow

      - name: Generate store screenshots
        run: xvfb-run --auto-servernum npm run screenshots
        timeout-minutes: 5

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: store-screenshots
          path: store/screenshots/
          retention-days: 90

      - name: Commit updated screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add store/screenshots/
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
          else
            git commit -m "Update store screenshots [automated]"
            git push
          fi
